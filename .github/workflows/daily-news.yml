name: Daily RSS AI Digest

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-rss-ai-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      TARGET_LANGUAGE: ${{ vars.TARGET_LANGUAGE || 'zh-CN' }}
      TIMEZONE: ${{ vars.TIMEZONE || 'Asia/Shanghai' }}
      MAX_CANDIDATES: ${{ vars.MAX_CANDIDATES || '80' }}
      MAX_SELECTED: ${{ vars.MAX_SELECTED || '15' }}
      MIN_MATCH_SCORE: ${{ vars.MIN_MATCH_SCORE || '60' }}
      MAX_PER_SOURCE: ${{ vars.MAX_PER_SOURCE || '2' }}
      MAX_PER_TOPIC_CLUSTER: ${{ vars.MAX_PER_TOPIC_CLUSTER || '2' }}
      OPENAI_API_MODE: ${{ vars.OPENAI_API_MODE || 'chat' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      SELECTION_MODEL: ${{ vars.SELECTION_MODEL }}
      OPENAI_SELECTION_MODEL: ${{ vars.OPENAI_SELECTION_MODEL }}
      SELECTION_REASONING_EFFORT: ${{ vars.SELECTION_REASONING_EFFORT }}
      OPENAI_SELECTION_REASONING_EFFORT: ${{ vars.OPENAI_SELECTION_REASONING_EFFORT }}
      SELECTION_REASONING_SUMMARY: ${{ vars.SELECTION_REASONING_SUMMARY }}
      TRANSLATION_MODEL: ${{ vars.TRANSLATION_MODEL }}
      OPENAI_TRANSLATION_MODEL: ${{ vars.OPENAI_TRANSLATION_MODEL }}
      TRANSLATION_BATCH_SIZE: ${{ vars.TRANSLATION_BATCH_SIZE || '3' }}
      USER_PREFERENCE: ${{ vars.USER_PREFERENCE }}
      EMAIL_SUBJECT: ${{ vars.EMAIL_SUBJECT }}
      DRY_RUN: ${{ vars.DRY_RUN || '1' }}
      COMMIT_RUNTIME_STATE: ${{ vars.COMMIT_RUNTIME_STATE || '0' }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.deepseek.com' }}
     

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: git pull --ff-only origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python scripts/news_pipeline.py

      - name: Upload digest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest
          path: |
            out/daily_digest.html
            out/processed_items.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit state updates
        if: env.DRY_RUN != '1' && env.COMMIT_RUNTIME_STATE == '1'
        run: |
          if git diff --quiet -- state/sent_items.json logs; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/sent_items.json logs
          git commit -m "chore(state): update sent items and run logs"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
