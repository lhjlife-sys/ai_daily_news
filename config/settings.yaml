pipeline:
  user_preference: >
    MUST include: AI industry news — new model releases, product launches,
    research breakthroughs, funding, policy/regulation, and major company moves.
    PREFER: LLM, agents, multimodal AI, inference/training infrastructure,
    open-source models, and practical developer tools.
    EXCLUDE: general entertainment, sports, celebrity, lifestyle, non-AI tech gossip.
    When in doubt, prefer high-signal AI developments over broad tech news.
